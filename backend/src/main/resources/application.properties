
server.port=8080
server.forward-headers-strategy=framework
server.http2.enabled=true
server.compression.enabled=true

spring.web.error.whitelabel.enabled=false

spring.jmx.enabled=false

management.endpoints.access.default=none

debug=false

logging.level.org.apache.activemq.audit=OFF
logging.level.org.apache.activemq.artemis.core.server=WARN
logging.level.org.flywaydb.core.internal.license.VersionPrinter=OFF

spring.web.resources.cache.cachecontrol.max-age=86400
